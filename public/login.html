<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Вход · Sputnik Studio</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: black;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .login-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }
    .login-panel {
      background: rgba(15, 25, 40, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(100, 150, 255, 0.3);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: auto;
      animation: fadeIn 0.8s ease-out;
      transition: background 0.3s ease, backdrop-filter 0.3s ease, box-shadow 0.3s ease;
    }
    .login-panel:hover {
      background: rgba(20, 35, 55, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(100, 150, 255, 0.6);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-panel h2 {
      margin: 0 0 8px 0;
      font-weight: 600;
      font-size: 28px;
      text-align: center;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a0c0ff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-panel .subtitle {
      text-align: center;
      margin-bottom: 32px;
      color: #a0b5d0;
      font-size: 14px;
      font-weight: 400;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b0c8e0;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(10, 20, 35, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      box-sizing: border-box;
      font-family: inherit;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      background: rgba(20, 40, 70, 0.7);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .input-group input::placeholder {
      color: #7a8aa0;
    }
    .role-selector {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .role-btn {
      flex: 1;
      padding: 8px 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      color: #b0c8e0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .role-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 24px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }
    .login-btn:hover {
      transform: scale(1.01);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.5);
    }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #7a8aa0;
    }
    .login-footer a {
      color: #a0c0ff;
      text-decoration: none;
    }
    @media (max-width: 600px) {
      .login-panel {
        width: 90%;
        padding: 28px 20px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="canvas-container"></div>
  <div class="login-wrapper">
    <div class="login-panel">
      <h2>Sputnik Studio</h2>
      <div class="subtitle">проектирование AV-систем</div>
      
      <div class="input-group">
        <label>Логин</label>
        <input type="text" id="username" placeholder="инженер / pm / директор" value="engineer">
      </div>
      <div class="input-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••" value="demo">
      </div>
      <div class="input-group">
        <label>Роль (демо)</label>
        <div class="role-selector" id="role-selector">
          <div class="role-btn active" data-role="engineer">🔧 Инженер</div>
          <div class="role-btn" data-role="pm">📋 ГИП</div>
          <div class="role-btn" data-role="director">👑 Директор</div>
        </div>
      </div>
      
      <button class="login-btn" id="login-button">Войти в систему</button>
      <div class="login-footer">
        <span>Демо-режим · </span>
        <a href="#" id="skip-login">Пропустить вход</a>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    
    // --- Инициализация сцены ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(6, 4, 14);
    camera.lookAt(-2, 1, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.2;
    controls.rotateSpeed = 0.6;
    controls.enablePan = false;
    controls.maxPolarAngle = Math.PI / 1.8;
    controls.minDistance = 8;
    controls.maxDistance = 30;
    controls.target.set(-2, 1, 0);

    // --- Освещение (уменьшена интенсивность для спутника) ---
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 0.9);
    sunLight.position.set(8, 20, 6);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    const d = 20;
    sunLight.shadow.camera.left = -d;
    sunLight.shadow.camera.right = d;
    sunLight.shadow.camera.top = d;
    sunLight.shadow.camera.bottom = -d;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 50;
    sunLight.shadow.bias = -0.0005;
    scene.add(sunLight);
    
    const fillLight = new THREE.AmbientLight(0x404c66, 0.8);
    scene.add(fillLight);
    
    const backLight1 = new THREE.PointLight(0x6688aa, 0.5);
    backLight1.position.set(-5, 4, -10);
    scene.add(backLight1);
    const backLight2 = new THREE.PointLight(0xaa88aa, 0.4);
    backLight2.position.set(10, 3, -14);
    scene.add(backLight2);
    
    const planetFillLight = new THREE.PointLight(0xaaccdd, 0.5);
    planetFillLight.position.set(-2, 2, 8);
    scene.add(planetFillLight);

    // --- Туманность и звёзды ---
    function createNebula() {
      const geometry = new THREE.BufferGeometry();
      const count = 2500;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const color1 = new THREE.Color(0x906080);
      const color2 = new THREE.Color(0x704060);
      const color3 = new THREE.Color(0x5070a0);
      
      for (let i = 0; i < count; i++) {
        const r = 30 + Math.random() * 60;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        const x = Math.sin(phi) * Math.cos(theta) * r;
        const y = Math.sin(phi) * Math.sin(theta) * r * 0.4;
        const z = Math.cos(phi) * r;
        
        positions[i*3] = x;
        positions[i*3+1] = y + 2;
        positions[i*3+2] = z;
        
        let mixColor;
        if (Math.random() < 0.5) {
          mixColor = color1.clone().lerp(color2, Math.random());
        } else {
          mixColor = color1.clone().lerp(color3, Math.random());
        }
        mixColor.multiplyScalar(0.7 + Math.random() * 0.5);
        
        colors[i*3] = mixColor.r;
        colors[i*3+1] = mixColor.g;
        colors[i*3+2] = mixColor.b;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      
      const material = new THREE.PointsMaterial({ 
        size: 0.35, 
        vertexColors: true, 
        transparent: true, 
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      return new THREE.Points(geometry, material);
    }
    const nebula = createNebula();
    scene.add(nebula);
    
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 4000;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i += 3) {
      const r = 80 + Math.random() * 150;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      starsPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
      starsPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
      starsPositions[i+2] = Math.cos(phi) * r;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.2, transparent: true});
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);
    
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000 * 3; i+=3) {
      dustPos[i] = (Math.random() - 0.5) * 350;
      dustPos[i+1] = (Math.random() - 0.5) * 350;
      dustPos[i+2] = (Math.random() - 0.5) * 350;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({color: 0xd0b0c0, size: 0.1, transparent: true});
    const dust = new THREE.Points(dustGeo, dustMat);
    scene.add(dust);

    // --- Основная группа (смещена влево) ---
    const mainGroup = new THREE.Group();
    mainGroup.position.set(-4, 0.5, -2);
    scene.add(mainGroup);

    // --- Земля ---
    const earthGroup = new THREE.Group();
    const textureLoader = new THREE.TextureLoader();
    
    const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
    const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
    
    const earthMaterial = new THREE.MeshPhongMaterial({
      map: earthMap,
      specularMap: earthSpecularMap,
      specular: new THREE.Color(0x333333),
      shininess: 10,
      normalMap: earthNormalMap,
      normalScale: new THREE.Vector2(1.8, 1.8),
    });
    const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(2.4, 64, 64), earthMaterial);
    earthMesh.castShadow = true;
    earthMesh.receiveShadow = true;
    earthGroup.add(earthMesh);
    
    const cloudMaterial = new THREE.MeshPhongMaterial({
      map: cloudMap,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide
    });
    const cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(2.43, 64, 64), cloudMaterial);
    earthGroup.add(cloudMesh);
    
    const atmosGeo = new THREE.SphereGeometry(2.6, 64, 64);
    const atmosMat = new THREE.MeshPhongMaterial({
      color: 0x88aacc,
      transparent: true,
      opacity: 0.12,
      side: THREE.BackSide
    });
    const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
    earthGroup.add(atmosphere);
    
    earthGroup.position.set(0, 0.6, 0);
    mainGroup.add(earthGroup);

    // --- Спутник (голубые тона, сфера + 2 панели, без полусферы) ---
    const satellite = new THREE.Group();
    
    // Основная сфера (голубой оттенок)
    const coreSphere = new THREE.Mesh(new THREE.SphereGeometry(1.0, 32, 16), 
      new THREE.MeshStandardMaterial({ color: 0x7aa5c0, roughness: 0.4, metalness: 0.3, emissive: new THREE.Color(0x112233), emissiveIntensity: 0.1 }));
    coreSphere.castShadow = true;
    coreSphere.receiveShadow = true;
    satellite.add(coreSphere);
    
    // Декоративные кольца (серебристые)
    const ringGeo = new THREE.TorusGeometry(0.95, 0.06, 16, 32);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xaaccdd, roughness: 0.5, metalness: 0.4 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    ring.rotation.z = 0.3;
    ring.castShadow = true;
    ring.receiveShadow = true;
    satellite.add(ring);
    
    const ring2 = ring.clone();
    ring2.rotation.z = -0.2;
    ring2.rotation.x = 0.7;
    satellite.add(ring2);
    
    // Антенна (небольшая штыревая, без тарелки)
    const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), new THREE.MeshStandardMaterial({ color: 0xbbccdd, roughness: 0.3 }));
    antenna.position.set(0.8, 0.5, 0.5);
    antenna.rotation.z = 0.2;
    antenna.rotation.x = -0.3;
    antenna.castShadow = true;
    satellite.add(antenna);
    const antennaTip = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshStandardMaterial({ color: 0x88aacc, emissive: new THREE.Color(0x224466), emissiveIntensity: 0.3 }));
    antennaTip.position.set(1.2, 0.8, 0.7);
    antennaTip.castShadow = true;
    satellite.add(antennaTip);
    
    // Солнечные панели (две большие)
    function createPanel(sign) {
      const panelGroup = new THREE.Group();
      const frameMat = new THREE.MeshStandardMaterial({ color: 0x8aaccc, roughness: 0.5 });
      const cellMat = new THREE.MeshStandardMaterial({ color: 0x3a6a9c, roughness: 0.7, emissive: new THREE.Color(0x112233), emissiveIntensity: 0.2 });
      
      const frame = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.05, 1.2), frameMat);
      frame.castShadow = true;
      frame.receiveShadow = true;
      panelGroup.add(frame);
      
      for (let i = -1.0; i <= 1.0; i+=0.7) {
        for (let j = -0.3; j <= 0.3; j+=0.6) {
          const cell = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.02, 0.45), cellMat);
          cell.position.set(i, 0.04, j);
          cell.castShadow = true;
          cell.receiveShadow = true;
          panelGroup.add(cell);
        }
      }
      
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.0), new THREE.MeshStandardMaterial({ color: 0x99aacc }));
      arm.rotation.z = Math.PI/2;
      arm.position.set(sign * 1.2, 0.0, 0);
      arm.castShadow = true;
      arm.receiveShadow = true;
      panelGroup.add(arm);
      
      panelGroup.position.set(sign * 2.0, 0.2, 0);
      return panelGroup;
    }
    
    satellite.add(createPanel(-1));
    satellite.add(createPanel(1));
    
    satellite.position.set(4.5, 1.5, 1.5); // дальше от Земли
    satellite.rotation.y = 0.5;
    satellite.rotation.x = 0.1;
    satellite.rotation.z = 0.05;
    mainGroup.add(satellite);

    // --- Обломки (малиновые) ---
    const debrisGroup = new THREE.Group();
    const debrisMat = new THREE.MeshStandardMaterial({ 
      color: 0xb05070, 
      roughness: 0.7,
      emissive: new THREE.Color(0x331122),
      emissiveIntensity: 0.15
    });
    
    for (let i = 0; i < 50; i++) {
      let mesh;
      const shape = Math.random();
      if (shape < 0.4) {
        mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15 + Math.random()*0.2), debrisMat);
      } else if (shape < 0.7) {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.2, 0.3), debrisMat);
      } else {
        mesh = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.3, 4), debrisMat);
      }
      
      mesh.position.set(
        (Math.random() - 0.5) * 22,
        (Math.random() - 0.2) * 12,
        (Math.random() - 0.5) * 22 - 4
      );
      mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      debrisGroup.add(mesh);
    }
    mainGroup.add(debrisGroup);
    
    // --- Малые планеты ---
    function createSmallPlanet(radius, color, pos, mapType = null) {
      const geo = new THREE.SphereGeometry(radius, 32, 16);
      let mat;
      if (mapType === 'moon') {
        const moonMap = textureLoader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg');
        mat = new THREE.MeshStandardMaterial({ map: moonMap, roughness: 0.9, color: 0xc0a0b0 });
      } else {
        mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, emissive: new THREE.Color(0x221122), emissiveIntensity: 0.2 });
      }
      const planet = new THREE.Mesh(geo, mat);
      planet.position.set(pos[0], pos[1], pos[2]);
      planet.castShadow = true;
      planet.receiveShadow = true;
      return planet;
    }
    
    const smallPlanet1 = createSmallPlanet(1.0, 0xb06080, [-18, 2, -22]);
    const smallPlanet2 = createSmallPlanet(0.7, 0xa05070, [16, 2.5, -28]);
    const smallPlanet3 = createSmallPlanet(1.3, 0xc07090, [22, 0.5, -18], 'moon');
    const smallPlanet4 = createSmallPlanet(0.8, 0xd080a0, [-22, 3.5, 12]);
    
    scene.add(smallPlanet1);
    scene.add(smallPlanet2);
    scene.add(smallPlanet3);
    scene.add(smallPlanet4);
    
    const ringPlanetGeo = new THREE.TorusGeometry(1.8, 0.1, 16, 100);
    const ringPlanetMat = new THREE.MeshStandardMaterial({ color: 0xd07090, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
    const ringPlanet = new THREE.Mesh(ringPlanetGeo, ringPlanetMat);
    ringPlanet.rotation.x = Math.PI/2;
    ringPlanet.rotation.z = 0.5;
    ringPlanet.position.copy(smallPlanet3.position);
    scene.add(ringPlanet);
    
    // --- Анимация ---
    const clock = new THREE.Clock();
    
    function animate() {
      const delta = clock.getDelta();
      const elapsedTime = performance.now() * 0.001;
      
      earthGroup.rotation.y += 0.001;
      earthGroup.children[1].rotation.y += 0.0012;
      
      // Орбита спутника (увеличен радиус)
      const orbitRadius = 5.5;
      const orbitSpeed = 0.08;
      satellite.position.x = Math.cos(elapsedTime * orbitSpeed) * orbitRadius;
      satellite.position.z = Math.sin(elapsedTime * orbitSpeed) * orbitRadius * 0.6 + 1.5;
      satellite.position.y = 1.5 + Math.sin(elapsedTime * 0.4) * 0.3;
      
      satellite.rotation.y = elapsedTime * 0.1;
      satellite.rotation.x = 0.1 + Math.sin(elapsedTime * 0.2) * 0.05;
      
      debrisGroup.rotation.y += 0.001;
      debrisGroup.rotation.x += 0.0005;
      
      nebula.rotation.y += 0.0001;
      stars.rotation.y -= 0.00005;
      
      smallPlanet1.rotation.y += 0.001;
      smallPlanet2.rotation.y += 0.0015;
      smallPlanet3.rotation.y += 0.002;
      smallPlanet4.rotation.y += 0.001;
      ringPlanet.rotation.y += 0.001;
      
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Логика входа ---
    const roleButtons = document.querySelectorAll('.role-btn');
    let selectedRole = 'engineer';
    
    roleButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        roleButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
      });
    });
    
    function doLogin() {
      const username = document.getElementById('username').value.trim();
      localStorage.setItem('userName', username || 'Инженер');
      localStorage.setItem('userRole', selectedRole);
      window.location.href = '/reactflow/';
    }
    
    document.getElementById('login-button').addEventListener('click', doLogin);
    document.getElementById('skip-login').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.setItem('userName', 'Гость');
      localStorage.setItem('userRole', 'engineer');
      window.location.href = '/reactflow/';
    });
    
    document.getElementById('password').addEventListener('keypress', (e) => {
      if(e.key === 'Enter') doLogin();
    });
    document.getElementById('username').addEventListener('keypress', (e) => {
      if(e.key === 'Enter') doLogin();
    });
  </script>
